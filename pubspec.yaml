name: flutter_spritesheet_animation
description: >-
  Lightweight spritesheet animation widget for Flutter. Grid-based and JSON
  atlas (TexturePacker, Aseprite) support with named animations, playback
  modes, and external controller.
version: 1.0.0
homepage: https://github.com/erykkruk/flutter_spritesheet_animation
repository: https://github.com/erykkruk/flutter_spritesheet_animation
issue_tracker: https://github.com/erykkruk/flutter_spritesheet_animation/issues
topics:
  - animation
  - spritesheet
  - sprite
  - game
  - atlas

environment:
  sdk: ^3.11.4
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
